<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rayonis Design System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      /* Mode Clair */
      --background: oklch(95.08% 0.0481 184.07);
      --secondary-background: oklch(100% 0 0);
      --foreground: oklch(0% 0 0);
      --main-foreground: oklch(0% 0 0);
      --main: oklch(78.57% 0.1422 180.36);
      --border: oklch(0% 0 0);
      --ring: oklch(0% 0 0);
      --shadow: 4px 4px 0px 0px var(--border);
    }
    
    @media (prefers-color-scheme: dark) {
      /* Mode Sombre - Simulateur */
      /* Note: Pour voir le rendu Dark dans un navigateur configuré en Dark mode */
      :root {
        --background: oklch(22.65% 0.0236 198.49);
        --secondary-background: oklch(23.93% 0 0);
        --foreground: oklch(92.49% 0 0);
        --main-foreground: oklch(0% 0 0);
        --main: oklch(71.47% 0.129261 180.4742);
        --border: oklch(0% 0 0);
        --ring: oklch(100% 0 0);
      }
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    
    /* Utilitaires CSS personnalisés */
    .shadow-shadow {
      box-shadow: var(--shadow);
    }
    
    .bg-main { background-color: var(--main); }
    .text-main-foreground { color: var(--main-foreground); }
    .bg-secondary-background { background-color: var(--secondary-background); }
    .text-foreground { color: var(--foreground); }
    .bg-background { background-color: var(--background); }
    .bg-foreground { background-color: var(--foreground); }
    .text-background { color: var(--background); }
    .text-main { color: var(--main); }
    .border-border { border-color: var(--border); }
    
    .font-heading { font-weight: 700; font-family: ui-serif, Georgia, serif; }
  </style>
</head>
<body class="p-8">
  <div class="max-w-4xl mx-auto space-y-16">
    <header class="border-b-4 border-border pb-6 mb-12 flex justify-between items-end">
      <div>
        <h1 class="text-5xl font-heading mb-3 tracking-tight">Rayonis Design System</h1>
        <p class="text-xl opacity-80 font-medium">Documentation interactive des composants et des tokens UI.</p>
      </div>
    </header>

    <!-- SECTION COULEURS -->
    <section>
      <h2 class="text-3xl font-heading mb-8 border-b-2 border-border pb-2 inline-block">Couleurs (Tokens)</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        <div class="p-4 border-2 border-border shadow-shadow bg-background flex flex-col items-center justify-center h-32 transition-transform hover:-translate-y-1">
          <span class="font-bold">Background</span>
        </div>
        <div class="p-4 border-2 border-border shadow-shadow bg-main flex flex-col items-center justify-center h-32 transition-transform hover:-translate-y-1">
          <span class="font-bold text-main-foreground">Main</span>
          <span class="text-xs text-main-foreground opacity-70 mt-1">Accent</span>
        </div>
        <div class="p-4 border-2 border-border shadow-shadow bg-secondary-background flex flex-col items-center justify-center h-32 transition-transform hover:-translate-y-1">
          <span class="font-bold" style="color: var(--foreground)">Secondary</span>
        </div>
        <div class="p-4 border-2 border-border shadow-shadow bg-foreground flex flex-col items-center justify-center h-32 transition-transform hover:-translate-y-1">
          <span class="font-bold text-background">Foreground</span>
        </div>
      </div>
    </section>

    <!-- SECTION BOUTONS -->
    <section>
      <h2 class="text-3xl font-heading mb-8 border-b-2 border-border pb-2 inline-block">Boutons (Button)</h2>
      
      <div class="space-y-8">
        <!-- Tailles -->
        <div>
          <h3 class="text-xl font-bold mb-4">Tailles</h3>
          <div class="flex flex-wrap gap-6 items-end p-8 border-2 border-border bg-white" style="background-color: var(--secondary-background)">
            <!-- SM -->
            <button class="inline-flex items-center justify-center whitespace-nowrap rounded-none text-xs font-heading uppercase tracking-wider transition-all duration-300 shadow-shadow hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[0px_0px_0px_0px_var(--border)] border-2 border-border cursor-pointer bg-main text-main-foreground h-10 px-6">Bouton Small</button>
            
            <!-- Default -->
            <button class="inline-flex items-center justify-center whitespace-nowrap rounded-none text-sm font-heading uppercase tracking-wider transition-all duration-300 shadow-shadow hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[0px_0px_0px_0px_var(--border)] border-2 border-border cursor-pointer bg-main text-main-foreground h-12 px-8">Bouton Default</button>
            
            <!-- LG -->
            <button class="inline-flex items-center justify-center whitespace-nowrap rounded-none text-base font-heading uppercase tracking-wider transition-all duration-300 shadow-shadow hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[0px_0px_0px_0px_var(--border)] border-2 border-border cursor-pointer bg-main text-main-foreground h-16 px-10">Bouton Large</button>
          </div>
        </div>

        <!-- Variantes -->
        <div>
          <h3 class="text-xl font-bold mb-4">Variantes</h3>
          <div class="flex flex-wrap gap-6 items-center p-8 border-2 border-border bg-white" style="background-color: var(--secondary-background)">
            <!-- Default -->
            <button class="inline-flex items-center justify-center whitespace-nowrap rounded-none text-sm font-heading uppercase tracking-wider transition-all duration-300 shadow-shadow hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[0px_0px_0px_0px_var(--border)] border-2 border-border cursor-pointer bg-main text-main-foreground h-12 px-8">Default</button>
            
            <!-- Secondary -->
            <button class="inline-flex items-center justify-center whitespace-nowrap rounded-none text-sm font-heading uppercase tracking-wider transition-all duration-300 shadow-shadow hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[0px_0px_0px_0px_var(--border)] border-2 border-border cursor-pointer bg-secondary-background text-foreground h-12 px-8">Secondary</button>
            
            <!-- Outline -->
            <button class="inline-flex items-center justify-center whitespace-nowrap rounded-none text-sm font-heading uppercase tracking-wider transition-all duration-300 shadow-shadow hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[0px_0px_0px_0px_var(--border)] border-2 border-border cursor-pointer bg-background text-foreground h-12 px-8">Outline</button>

            <!-- Dark -->
            <button class="inline-flex items-center justify-center whitespace-nowrap rounded-none text-sm font-heading uppercase tracking-wider transition-all duration-300 shadow-shadow hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[0px_0px_0px_0px_var(--border)] border-2 border-border cursor-pointer bg-foreground text-background h-12 px-8">Dark</button>

            <!-- Ghost -->
            <button class="inline-flex items-center justify-center whitespace-nowrap rounded-none text-sm font-heading uppercase tracking-wider transition-all border-none bg-transparent hover:bg-black/5 cursor-pointer text-foreground h-12 px-8">Ghost</button>
            
            <!-- Link -->
            <button class="inline-flex items-center justify-center whitespace-nowrap rounded-none text-sm font-heading uppercase tracking-wider transition-all bg-transparent border-none shadow-none hover:translate-x-0 hover:translate-y-0 text-main underline-offset-4 hover:underline h-12 px-8 cursor-pointer">Link</button>
          </div>
        </div>
      </div>
    </section>

    <!-- SECTION FORMULAIRES -->
    <section>
      <h2 class="text-3xl font-heading mb-8 border-b-2 border-border pb-2 inline-block">Formulaires (Input & Textarea)</h2>
      <div class="space-y-6 max-w-lg p-8 border-2 border-border shadow-shadow bg-white" style="background-color: var(--secondary-background)">
        <div class="space-y-2">
          <label class="text-sm font-medium leading-none text-foreground">Nom complet</label>
          <input type="text" placeholder="John Doe" class="flex h-10 w-full rounded-md border border-border bg-background px-3 py-2 text-sm text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-main focus-visible:ring-offset-2">
        </div>

        <div class="space-y-2">
          <label class="text-sm font-medium leading-none text-foreground">Adresse Email</label>
          <input type="email" placeholder="john@example.com" class="flex h-10 w-full rounded-md border border-border bg-background px-3 py-2 text-sm text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-main focus-visible:ring-offset-2">
        </div>
        
        <div class="space-y-2">
          <label class="text-sm font-medium leading-none text-foreground">Message</label>
          <textarea placeholder="Comment pouvons-nous vous aider ?" class="flex min-h-[120px] w-full rounded-md border border-border bg-background px-3 py-2 text-sm text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-main focus-visible:ring-offset-2"></textarea>
        </div>

        <div class="pt-4">
           <button class="inline-flex items-center justify-center whitespace-nowrap rounded-none text-sm font-heading uppercase tracking-wider transition-all duration-300 shadow-shadow hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[0px_0px_0px_0px_var(--border)] border-2 border-border cursor-pointer bg-main text-main-foreground w-full h-12 px-8">
             Envoyer le message
           </button>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
